name: Doselog
options:
  bundleIdPrefix: com.shimondeitel.kidsdose
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Doselog:
    type: application
    platform: iOS
    sources:
      - path: Doselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kidsdose
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Doselog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DoselogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DoselogTests
      - path: Doselog.storekit
    dependencies:
      - target: Doselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kidsdose.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DoselogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DoselogUITests
    dependencies:
      - target: Doselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kidsdose.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Doselog:
    build:
      targets:
        Doselog: all
        DoselogTests: [test]
        DoselogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Doselog.storekit
    test:
      config: Debug
      storeKitConfiguration: Doselog.storekit
      targets:
        - DoselogTests
        - DoselogUITests
    archive:
      config: Release
